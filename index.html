<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAMMAR QUEST — Present Continuous</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a1628;--surface:rgba(255,255,255,0.09);--border:rgba(255,255,255,0.18);--text:#ffffff;--text-dim:rgba(255,255,255,0.75);--text-muted:rgba(255,255,255,0.45);--cyan:#00f0ff;--cyan-dim:rgba(0,240,255,0.15);--cyan-glow:rgba(0,240,255,0.6);--green:#00ff88;--green-dim:rgba(0,255,136,0.15);--green-glow:rgba(0,255,136,0.6);--red:#ff4d6d;--gold:#ffcc00;--gold-dim:rgba(255,204,0,0.18);--gold-glow:rgba(255,204,0,0.6);--purple:#cc77ff;--purple-dim:rgba(204,119,255,0.18);--purple-glow:rgba(204,119,255,0.6);--orange:#ff8c42;--radius:12px;--radius-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;overflow-x:hidden;position:relative;background:linear-gradient(160deg,#060d1e 0%,#0e1a3a 35%,#161030 65%,#060d1e 100%);}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 45% at 15% 25%,rgba(0,100,220,0.35) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 85% 75%,rgba(80,20,160,0.3) 0%,transparent 70%),radial-gradient(ellipse 40% 35% at 55% 5%,rgba(0,180,255,0.2) 0%,transparent 65%);pointer-events:none;z-index:0;}
#starCanvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
#particleCanvas{position:fixed;inset:0;z-index:3;pointer-events:none;}
header{position:relative;z-index:10;padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,13,30,0.85);border-bottom:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(16px);}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);opacity:0.9;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:18px;letter-spacing:4px;background:linear-gradient(135deg,#00f0ff,#ffffff,#cc77ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 10px rgba(0,240,255,0.5));}
.logo-sub{font-size:10px;letter-spacing:2px;color:var(--text-muted);font-family:'Rajdhani',sans-serif;-webkit-text-fill-color:var(--text-muted);display:block;margin-top:-3px;}
.btn-reset{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:7px 14px;border:1px solid rgba(255,77,109,0.35);background:rgba(255,77,109,0.07);color:rgba(255,255,255,0.45);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.25s;}
.btn-reset:hover{border-color:var(--red);color:var(--red);background:rgba(255,77,109,0.14);}
.screen{display:none;position:relative;z-index:2;padding:24px;max-width:860px;margin:0 auto;}
.screen.active{display:block;}
.map-hero{text-align:center;padding:28px 0 20px;}
.map-hero h1{font-family:'Orbitron',monospace;font-weight:900;font-size:36px;letter-spacing:6px;background:linear-gradient(135deg,#00f0ff 0%,#ffffff 50%,#cc77ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:titleGlow 3s ease-in-out infinite;margin-bottom:6px;}
.map-hero h2{font-family:'Orbitron',monospace;font-weight:600;font-size:13px;letter-spacing:4px;color:var(--cyan);opacity:0.7;margin-bottom:8px;}
@keyframes titleGlow{0%,100%{filter:drop-shadow(0 0 14px rgba(0,240,255,0.5));}50%{filter:drop-shadow(0 0 32px rgba(0,240,255,0.9));}}
.map-hero p{color:var(--text-muted);font-size:13px;letter-spacing:3px;text-transform:uppercase;}
.xp-panel{background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(10px);}
.xp-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--text-muted);min-width:24px;}
.xp-track{flex:1;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08);border-radius:4px;height:14px;overflow:hidden;position:relative;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--cyan),#8800ff,var(--purple));background-size:200% 100%;border-radius:4px;transition:width 0.9s cubic-bezier(0.4,0,0.2,1);animation:xpShimmer 2.5s linear infinite;box-shadow:0 0 10px var(--cyan-glow);}
@keyframes xpShimmer{0%{background-position:0% 0%;}100%{background-position:200% 0%;}}
.xp-fill::after{content:'';position:absolute;top:0;right:0;width:8px;height:100%;background:white;opacity:0.7;filter:blur(2px);}
.xp-num{font-family:'Orbitron',monospace;font-size:12px;color:#fff;white-space:nowrap;font-weight:700;}
.sections-list{display:flex;flex-direction:column;gap:9px;}
.section-card{border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:14px;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;border:2px solid;}
.section-card::after{content:'';position:absolute;top:0;left:0;right:0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,transparent 100%);pointer-events:none;border-radius:10px 10px 0 0;}
.section-card.locked{background:linear-gradient(135deg,rgba(100,90,130,0.35) 0%,rgba(70,60,100,0.3) 100%);border-color:rgba(180,170,210,0.25);cursor:not-allowed;filter:saturate(0.3) brightness(0.7);}
.section-card.unlocked{background:linear-gradient(135deg,rgba(0,180,255,0.28) 0%,rgba(60,30,180,0.35) 100%);border-color:var(--cyan);cursor:pointer;animation:unlockBreath 3s ease-in-out infinite;}
@keyframes unlockBreath{0%,100%{box-shadow:0 4px 20px rgba(0,0,0,0.4),0 0 12px rgba(0,240,255,0.25);}50%{box-shadow:0 4px 24px rgba(0,0,0,0.4),0 0 28px rgba(0,240,255,0.55);}}
.section-card.unlocked:hover{transform:translateX(7px) scale(1.01);border-color:#55ffff;box-shadow:0 6px 28px rgba(0,0,0,0.5),0 0 42px rgba(0,240,255,0.65)!important;animation:none;}
.section-card.completed{background:linear-gradient(135deg,rgba(0,140,70,0.55) 0%,rgba(0,80,40,0.45) 100%);border-color:var(--green);opacity:0.8;}
.section-card.revision{background:linear-gradient(135deg,rgba(200,140,0,0.5) 0%,rgba(120,80,0,0.45) 100%);border-color:var(--gold);cursor:pointer;animation:revPulse 2s ease-in-out infinite;}
@keyframes revPulse{0%,100%{box-shadow:0 4px 20px rgba(0,0,0,0.4),0 0 14px rgba(255,204,0,0.3);}50%{box-shadow:0 4px 24px rgba(0,0,0,0.4),0 0 32px rgba(255,204,0,0.65);}}
.section-card.revision:hover{transform:translateX(7px) scale(1.01);border-color:#ffee44;box-shadow:0 6px 28px rgba(0,0,0,0.5),0 0 44px rgba(255,204,0,0.75)!important;animation:none;}
.section-card.revision-done{background:linear-gradient(135deg,rgba(0,140,70,0.5),rgba(0,80,40,0.4));border-color:var(--green);opacity:0.65;}
.section-card.difficult{background:linear-gradient(135deg,rgba(150,40,220,0.55) 0%,rgba(90,10,150,0.5) 100%);border-color:var(--purple);cursor:pointer;animation:bossPulse 1.6s ease-in-out infinite;}
@keyframes bossPulse{0%,100%{box-shadow:0 4px 20px rgba(0,0,0,0.4),0 0 16px rgba(204,119,255,0.3);}50%{box-shadow:0 4px 24px rgba(0,0,0,0.4),0 0 38px rgba(204,119,255,0.7);}}
.section-card.difficult:hover{transform:translateX(7px) scale(1.01);border-color:#ee88ff;box-shadow:0 6px 28px rgba(0,0,0,0.5),0 0 50px rgba(204,119,255,0.8)!important;animation:none;}
.section-card.difficult-done{background:linear-gradient(135deg,rgba(0,140,70,0.5),rgba(0,80,40,0.4));border-color:var(--green);opacity:0.65;}
.sc-icon{font-family:'Orbitron',monospace;font-weight:900;font-size:20px;min-width:46px;text-align:center;flex-shrink:0;}
.section-card.locked .sc-icon{color:rgba(200,190,220,0.5);}
.section-card.unlocked .sc-icon{color:#ffffff;text-shadow:0 0 16px var(--cyan-glow);}
.section-card.completed .sc-icon{color:var(--green);text-shadow:0 0 12px var(--green-glow);}
.section-card.revision .sc-icon{color:#fff8aa;text-shadow:0 0 16px var(--gold-glow);}
.section-card.revision-done .sc-icon{color:var(--green);}
.section-card.difficult .sc-icon{color:#ffffff;text-shadow:0 0 20px var(--purple-glow);font-size:22px;}
.section-card.difficult-done .sc-icon{color:var(--green);}
.sc-body{flex:1;min-width:0;}
.sc-title{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.section-card.locked .sc-title{color:rgba(200,190,220,0.55);}
.section-card.unlocked .sc-title{color:#ffffff;}
.section-card.completed .sc-title{color:#aaffcc;}
.section-card.revision .sc-title{color:#fff8aa;}
.section-card.revision-done .sc-title{color:#aaffcc;}
.section-card.difficult .sc-title{color:#f0ccff;}
.section-card.difficult-done .sc-title{color:#aaffcc;}
.sc-desc{font-size:13px;color:rgba(255,255,255,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.section-card.unlocked .sc-desc{color:rgba(255,255,255,0.65);}
.section-card.revision .sc-desc{color:rgba(255,248,170,0.65);}
.section-card.difficult .sc-desc{color:rgba(240,204,255,0.65);}
.sc-badge{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;padding:5px 11px;border-radius:4px;white-space:nowrap;border:1px solid;flex-shrink:0;font-weight:700;}
.badge-locked{border-color:rgba(200,190,220,0.3);color:rgba(200,190,220,0.45);background:rgba(100,90,130,0.2);}
.badge-todo{border-color:var(--cyan);color:#ffffff;background:rgba(0,180,255,0.35);}
.badge-done{border-color:var(--green);color:#aaffcc;background:rgba(0,160,80,0.3);}
.badge-required{border-color:var(--gold);color:#fff8aa;background:rgba(180,130,0,0.4);}
.badge-required-purple{border-color:var(--purple);color:#f0ccff;background:rgba(130,40,200,0.4);}
.ex-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.12);flex-wrap:wrap;gap:10px;}
.ex-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--cyan);text-shadow:0 0 12px var(--cyan-glow);}
.hud{display:flex;align-items:center;gap:12px;margin-bottom:16px;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:11px 16px;flex-wrap:wrap;backdrop-filter:blur(10px);}
.hud-track{flex:1;min-width:120px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:3px;height:10px;overflow:hidden;}
.hud-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:3px;transition:width 0.4s ease;box-shadow:0 0 8px var(--cyan-glow);}
.hud-text{font-family:'Orbitron',monospace;font-size:11px;color:#fff;font-weight:700;white-space:nowrap;}
.hud-ok{font-family:'Orbitron',monospace;font-size:12px;color:var(--green);font-weight:700;}
.hud-bad{font-family:'Orbitron',monospace;font-size:12px;color:var(--red);font-weight:700;}
.rule-box{background:rgba(0,240,255,0.06);border:1px solid rgba(0,240,255,0.22);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;font-size:14px;color:var(--text-dim);line-height:1.7;}
.rule-box strong{color:var(--cyan);font-weight:700;}
.rule-box code{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:2px 8px;font-family:'Rajdhani',sans-serif;font-size:13px;color:#ffffff;letter-spacing:0.5px;}
.rule-box .rule-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.rule-box .rule-col{background:rgba(0,0,0,0.2);border-radius:6px;padding:10px 12px;font-size:13px;}
.rule-box .rule-col h4{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--gold);margin-bottom:6px;}
.ex-card{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.22);border-radius:var(--radius);padding:24px 28px;margin-bottom:14px;position:relative;overflow:hidden;animation:cardIn 0.3s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(14px);box-shadow:0 8px 32px rgba(0,0,0,0.35);}
.ex-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);}
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.ex-type-badge{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--text-muted);margin-bottom:10px;}
.ex-question{font-size:17px;font-weight:600;color:#ffffff;line-height:1.7;margin-bottom:18px;}
.fill-input{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);padding:9px 14px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:#ffffff;outline:none;transition:all 0.2s;letter-spacing:0.5px;min-width:180px;max-width:100%;}
.fill-input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,240,255,0.2),0 0 14px rgba(0,240,255,0.2);background:rgba(0,240,255,0.05);}
.fill-input.correct{border-color:var(--green);background:rgba(0,255,136,0.1);color:var(--green);box-shadow:0 0 0 2px rgba(0,255,136,0.2),0 0 14px var(--green-glow);}
.fill-input.wrong{border-color:var(--red);background:rgba(255,77,109,0.1);color:var(--red);}
.mc-options{display:flex;flex-direction:column;gap:9px;margin-bottom:4px;}
.mc-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);padding:11px 18px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all 0.2s;text-align:left;}
.mc-btn:hover:not(:disabled){border-color:var(--cyan);color:#ffffff;background:rgba(0,240,255,0.08);}
.mc-btn.selected{border-color:var(--cyan);color:#ffffff;background:rgba(0,240,255,0.12);}
.mc-btn.correct{border-color:var(--green)!important;color:var(--green)!important;background:rgba(0,255,136,0.12)!important;box-shadow:0 0 12px rgba(0,255,136,0.3);}
.mc-btn.wrong{border-color:var(--red)!important;color:var(--red)!important;background:rgba(255,77,109,0.12)!important;}
.mc-btn:disabled{cursor:not-allowed;}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:42px;}
.word-chip{background:rgba(0,180,255,0.15);border:1px solid rgba(0,180,255,0.4);border-radius:6px;padding:6px 14px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:#ffffff;cursor:pointer;transition:all 0.18s;user-select:none;}
.word-chip:hover{background:rgba(0,180,255,0.28);border-color:var(--cyan);transform:translateY(-1px);}
.word-chip.used{opacity:0.3;cursor:not-allowed;background:rgba(100,100,100,0.15);border-color:rgba(255,255,255,0.1);}
.answer-area{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius-sm);padding:10px 14px;min-height:48px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
.answer-area .word-chip{background:rgba(60,30,180,0.3);border-color:rgba(120,80,255,0.5);}
.answer-area .word-chip:hover{background:rgba(80,40,200,0.4);border-color:var(--purple);}
.answer-area.correct{border-color:var(--green);background:rgba(0,255,136,0.05);}
.answer-area.wrong{border-color:var(--red);background:rgba(255,77,109,0.05);}
.reorder-hint{font-size:13px;color:var(--text-muted);margin-bottom:10px;font-style:italic;}
.feedback-msg{margin-top:10px;font-size:14px;font-weight:600;min-height:20px;}
.feedback-msg.ok{color:var(--green);}
.feedback-msg.err{color:var(--red);}
.action-bar{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
.btn{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;padding:11px 22px;border-radius:var(--radius-sm);border:1px solid;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px);}
.btn-primary{background:rgba(0,200,255,0.2);border-color:var(--cyan);color:#ffffff;}
.btn-primary:hover{background:rgba(0,200,255,0.32);box-shadow:0 0 22px rgba(0,240,255,0.5);transform:translateY(-2px);}
.btn-secondary{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.22);color:var(--text-dim);}
.btn-secondary:hover{border-color:rgba(255,255,255,0.5);color:#ffffff;}
.btn-green{background:rgba(0,200,100,0.22);border-color:var(--green);color:#aaffcc;}
.btn-green:hover{background:rgba(0,200,100,0.34);box-shadow:0 0 22px rgba(0,255,136,0.5);transform:translateY(-2px);}
.btn-back{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:7px 14px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:var(--text-dim);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s;}
.btn-back:hover{border-color:var(--cyan);color:var(--cyan);}
.results-card{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius);padding:36px;text-align:center;backdrop-filter:blur(14px);box-shadow:0 8px 40px rgba(0,0,0,0.4);position:relative;overflow:hidden;}
.results-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),var(--purple),transparent);}
.res-pct{font-family:'Orbitron',monospace;font-weight:900;font-size:72px;line-height:1;margin-bottom:8px;}
.res-pct.pass{color:var(--green);text-shadow:0 0 30px var(--green-glow);animation:winGlow 1.5s ease-in-out infinite;}
@keyframes winGlow{0%,100%{text-shadow:0 0 20px var(--green-glow);}50%{text-shadow:0 0 50px var(--green-glow),0 0 80px rgba(0,255,136,0.4);}}
.res-pct.fail{color:var(--red);}
.res-label{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:4px;margin-bottom:6px;}
.res-label.pass{color:var(--green);}.res-label.fail{color:var(--red);}
.res-threshold{font-size:12px;color:var(--text-muted);letter-spacing:1px;margin-bottom:24px;}
.res-breakdown{display:flex;justify-content:center;gap:36px;margin-bottom:24px;flex-wrap:wrap;}
.rb-item{text-align:center;}
.rb-num{font-family:'Orbitron',monospace;font-weight:900;font-size:34px;}
.rb-num.g{color:var(--green);text-shadow:0 0 14px var(--green-glow);}.rb-num.r{color:var(--red);}
.rb-label{font-size:9px;letter-spacing:2px;color:var(--text-muted);font-family:'Orbitron',monospace;}
.retry-notice{background:rgba(255,140,66,0.12);border:1px solid rgba(255,140,66,0.3);border-radius:var(--radius-sm);padding:9px 14px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--orange);margin-bottom:12px;}
.completion-banner{background:rgba(255,255,255,0.09);border:2px solid rgba(255,204,0,0.55);border-radius:var(--radius);padding:40px;text-align:center;backdrop-filter:blur(14px);box-shadow:0 8px 40px rgba(255,204,0,0.2);position:relative;overflow:hidden;}
.completion-banner::before{content:'';position:absolute;top:0;left:-200%;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:scanGold 2s linear infinite;}
@keyframes scanGold{to{left:200%;}}
.cb-emoji{font-size:60px;margin-bottom:14px;display:block;animation:trophy 1s ease-in-out infinite;}
@keyframes trophy{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-8px) scale(1.05);}}
.cb-title{font-family:'Orbitron',monospace;font-weight:900;font-size:22px;letter-spacing:4px;color:var(--gold);text-shadow:0 0 25px var(--gold-glow);margin-bottom:8px;}
.cb-text{color:var(--text-muted);font-size:13px;letter-spacing:2px;}
.ex-card.flash-correct{animation:fCorrect 0.5s ease forwards!important;}
.ex-card.flash-wrong{animation:fWrong 0.4s ease forwards!important;}

<script>
const sc=document.getElementById('starCanvas'),sctx=sc.getContext('2d');let stars=[];
function resizeSC(){sc.width=innerWidth;sc.height=innerHeight;stars=[];for(let i=0;i<240;i++)stars.push({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*2+0.3,alpha:Math.random()*0.9+0.1,twinkle:Math.random()*Math.PI*2,ts:Math.random()*0.02+0.005,vy:Math.random()*0.08+0.01,color:['#ffffff','#ffffff','#aaddff','#ddaaff','#ffffcc'][Math.floor(Math.random()*5)]});}
function animStars(){sctx.clearRect(0,0,sc.width,sc.height);stars.forEach(s=>{s.twinkle+=s.ts;const a=s.alpha*(0.4+0.6*Math.sin(s.twinkle));sctx.globalAlpha=a;if(s.r>1.3){sctx.save();sctx.translate(s.x,s.y);sctx.fillStyle=s.color;sctx.beginPath();for(let i=0;i<8;i++){const ang=(i*Math.PI)/4-Math.PI/2,r=i%2===0?s.r*1.6:s.r*0.35;i===0?sctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):sctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);}sctx.closePath();sctx.fill();sctx.restore();}else{sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fillStyle=s.color;sctx.fill();}sctx.globalAlpha=1;s.y+=s.vy;if(s.y>sc.height+5){s.y=-5;s.x=Math.random()*sc.width;}});requestAnimationFrame(animStars);}
window.addEventListener('resize',resizeSC);resizeSC();animStars();
const pc=document.getElementById('particleCanvas'),pctx=pc.getContext('2d');let particles=[];
function resizePC(){pc.width=innerWidth;pc.height=innerHeight;}window.addEventListener('resize',resizePC);resizePC();
function spawnBurst(x,y,color,count=28){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*7+2;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,r:Math.random()*4+1,alpha:1,color,gravity:0.18,decay:Math.random()*0.022+0.014,star:false});}const sc2=['#ffffff','#ffffaa','#aaffff'];for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*11+5;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,r:Math.random()*3+1.5,alpha:1,color:sc2[Math.floor(Math.random()*sc2.length)],gravity:0.12,decay:Math.random()*0.028+0.018,star:true});}}
function drawSpk(ctx,x,y,r){ctx.beginPath();for(let i=0;i<8;i++){const a=(i*Math.PI)/4-Math.PI/2,rad=i%2===0?r:r*0.35;i===0?ctx.moveTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad):ctx.lineTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad);}ctx.closePath();ctx.fill();}
function animParticles(){pctx.clearRect(0,0,pc.width,pc.height);particles=particles.filter(p=>p.alpha>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.alpha-=p.decay;pctx.globalAlpha=Math.max(0,p.alpha);pctx.fillStyle=p.color;if(p.star)drawSpk(pctx,p.x,p.y,p.r);else{pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fill();}});pctx.globalAlpha=1;requestAnimationFrame(animParticles);}
animParticles();
function burstAt(el,color){const r=el.getBoundingClientRect();spawnBurst(r.left+r.width/2,r.top+r.height/2,color);}

rule:`<strong>SPELLING RULES for -ING:</strong><br>

]},
{id:"r8",type:"revision",title:"⟳ RIPASSO — LIVELLO 8",desc:"Present Continuous per il futuro",revises:[8]},
{id:"d8",type:"difficult",title:"★ BOSS FIGHT — DIFFICILI 8",desc:"esercizi sbagliati ≥2 volte · eliminali!",revises:[8]},
{id:"rfinal",type:"revision",title:"⟳ FINAL BOSS — TUTTO IL PRESENT CONTINUOUS",desc:"boss finale · tutti i livelli · diventa MASTER!",revises:[1,2,3,4,5,6,7,8]},
];

const SK='gq_pc_s_v1',EK='gq_pc_e_v1';
let state={},errorMap={};
function loadState(){try{state=JSON.parse(localStorage.getItem(SK))||{};}catch(e){state={};}try{errorMap=JSON.parse(localStorage.getItem(EK))||{};}catch(e){errorMap={};}LEVELS.forEach(s=>{if(state[s.id]===undefined)state[s.id]='locked';});if(state[LEVELS[0].id]==='locked')state[LEVELS[0].id]='unlocked';saveState();}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}try{localStorage.setItem(EK,JSON.stringify(errorMap));}catch(e){}}
function recordError(key){errorMap[key]=(errorMap[key]||0)+1;saveState();}
function getErrors(ids){let exs=[];ids.forEach(id=>{const s=LEVELS.find(x=>x.id===id);if(s&&s.exercises)exs=exs.concat(s.exercises.map((e,i)=>({...e,_key:`${id}_${i}`})));});return exs.filter(e=>(errorMap[e._key]||0)>=2);}
function unlockNext(cid){const idx=LEVELS.findIndex(s=>s.id===cid);if(idx<0)return;if(idx+1<LEVELS.length){const n=LEVELS[idx+1];if(state[n.id]==='locked')state[n.id]='unlocked';}autoComplete();saveState();}
function autoComplete(){let changed=true;while(changed){changed=false;LEVELS.forEach((s,i)=>{if(s.type==='difficult'&&state[s.id]==='unlocked'&&getErrors(s.revises).length===0){state[s.id]='completed';if(i+1<LEVELS.length&&state[LEVELS[i+1].id]==='locked'){state[LEVELS[i+1].id]='unlocked';changed=true;}}});}}
function renderMap(){
  const list=document.getElementById('sectionsList');list.innerHTML='';
  const total=LEVELS.length,done=LEVELS.filter(s=>state[s.id]==='completed').length;
  document.getElementById('overallBar').style.width=`${(done/total)*100}%`;
  document.getElementById('overallText').textContent=`${done} / ${total}`;
  if(done===total){const b=document.createElement('div');b.className='completion-banner';b.innerHTML=`<span class="cb-emoji">🏆</span><div class="cb-title">GRAMMAR MASTER!</div><div class="cb-text">hai completato tutto il Present Continuous · missione compiuta</div>`;list.appendChild(b);setTimeout(()=>{for(let i=0;i<8;i++)setTimeout(()=>spawnBurst(Math.random()*innerWidth,Math.random()*innerHeight*0.6,['#00f0ff','#00ff88','#ffcc00','#cc77ff'][i%4],20),i*250);},100);return;}
  LEVELS.forEach(s=>{
    const st=state[s.id];const card=document.createElement('div');
    let cls='section-card ',badge='',icon='';
    if(typeof s.id==='number')icon=String(s.id).padStart(2,'0');
    else if(s.type==='revision')icon='↺';else icon='★';
    if(st==='completed'){cls+=s.type==='difficult'?'difficult-done':s.type==='revision'?'revision-done':'completed';badge=`<span class="sc-badge badge-done">✓ DONE</span>`;}
    else if(st==='unlocked'){if(s.type==='revision'){cls+='revision';badge=`<span class="sc-badge badge-required">⚠ OBB.</span>`;}else if(s.type==='difficult'){cls+='difficult';badge=`<span class="sc-badge badge-required-purple">★ ${getErrors(s.revises).length}</span>`;}else{cls+='unlocked';badge=`<span class="sc-badge badge-todo">▶ PLAY</span>`;}}
    else{cls+='locked';badge=`<span class="sc-badge badge-locked">🔒</span>`;}
    card.className=cls;card.innerHTML=`<div class="sc-icon">${icon}</div><div class="sc-body"><div class="sc-title">${s.title}</div><div class="sc-desc">${s.desc}</div></div>${badge}`;
    if(st==='unlocked')card.onclick=()=>openLevel(s);
    list.appendChild(card);
  });
}
let currentLevel=null,exQueue=[],exIdx=0,okCount=0,badCount=0,exChecked=false,isRetry=false,retryQueue=[],selectedMC=-1,reorderWords=[];
function openLevel(s){
  currentLevel=s;let exs;
  if(s.type==='study'){exs=s.exercises.map((e,i)=>({...e,_key:`${s.id}_${i}`}));}
  else if(s.type==='revision'){exs=[];s.revises.forEach(id=>{const sec=LEVELS.find(x=>x.id===id);if(sec&&sec.exercises)exs=exs.concat(sec.exercises.map((e,i)=>({...e,_key:`${id}_${i}`})));});exs=shuffle(exs).slice(0,Math.min(exs.length,16));}
  else{exs=getErrors(s.revises);if(!exs.length){state[s.id]='completed';unlockNext(s.id);saveState();goMap();return;}}
  exQueue=shuffle(exs);retryQueue=[];exIdx=0;okCount=0;badCount=0;exChecked=false;isRetry=false;
  document.getElementById('exTitle').textContent=currentLevel.title;
  showScreen('exercise');renderExercise();
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function renderExercise(){
  exChecked=false;selectedMC=-1;reorderWords=[];
  const ex=exQueue[exIdx];
  const pct=exQueue.length>0?(exIdx/exQueue.length)*100:0;
  document.getElementById('hudFill').style.width=`${pct}%`;
  document.getElementById('hudText').textContent=`${exIdx+1}/${exQueue.length}`;
  document.getElementById('hudOk').textContent=`✓ ${okCount}`;
  document.getElementById('hudBad').textContent=`✗ ${badCount}`;
  document.getElementById('checkBtn').style.display='inline-block';
  document.getElementById('nextBtn').style.display='none';
  const ruleHtml=currentLevel.type==='study'&&currentLevel.rule?`<div class="rule-box">${currentLevel.rule}</div>`:'';
  const retryHtml=isRetry?`<div class="retry-notice">⚠ ROUND DI RECUPERO — ${exQueue.length} esercizi</div>`:'';
  let cardHtml='';
  if(ex.type==='fill'){
    const hintHtml=ex.hint?`<span style="color:var(--text-muted);font-size:14px;font-weight:400"> ${ex.hint}</span>`:'';
    cardHtml=`<div class="ex-card" id="exCard"><div class="ex-type-badge">// FILL IN THE BLANK</div><div class="ex-question">${ex.q}${hintHtml}</div><input class="fill-input" id="fillInput" autocomplete="off" spellcheck="false" placeholder="scrivi qui..." onkeydown="if(event.key==='Enter'){if(!exChecked)checkExercise();else nextExercise();}"><div class="feedback-msg" id="feedbackMsg"></div></div>`;
  } else if(ex.type==='mc'){
    const opts=ex.opts.map((o,i)=>`<button class="mc-btn" id="mcBtn${i}" onclick="selectMC(${i})">${o}</button>`).join('');
    cardHtml=`<div class="ex-card" id="exCard"><div class="ex-type-badge">// MULTIPLE CHOICE</div><div class="ex-question">${ex.q}</div><div class="mc-options">${opts}</div><div class="feedback-msg" id="feedbackMsg"></div></div>`;
  } else if(ex.type==='reorder'){
    const shuffledIdx=shuffle(ex.words.map((_,i)=>i));
    const chips=shuffledIdx.map(i=>`<div class="word-chip" id="chip${i}" onclick="addWord(${i},this)">${ex.words[i]}</div>`).join('');
    cardHtml=`<div class="ex-card" id="exCard"><div class="ex-type-badge">// WORD ORDER</div><div class="ex-question">${ex.instruction}</div><div class="reorder-hint">Clicca le parole nell'ordine corretto · clicca sulla risposta per rimuovere</div><div class="word-bank" id="wordBank">${chips}</div><div class="answer-area" id="answerArea"></div><div class="feedback-msg" id="feedbackMsg"></div></div>`;
  }
  document.getElementById('exerciseArea').innerHTML=ruleHtml+retryHtml+cardHtml;
  if(ex.type==='fill')setTimeout(()=>{const i=document.getElementById('fillInput');if(i)i.focus();},50);
}
function selectMC(i){if(exChecked)return;selectedMC=i;document.querySelectorAll('.mc-btn').forEach((b,j)=>b.classList.toggle('selected',j===i));}
function addWord(idx,el){
  if(exChecked||el.classList.contains('used'))return;
  el.classList.add('used');const word=el.textContent;reorderWords.push({idx,word});
  const area=document.getElementById('answerArea');const chip=document.createElement('div');chip.className='word-chip';chip.textContent=word;
  const ci=idx;chip.onclick=()=>{if(exChecked)return;const pos=reorderWords.findIndex(w=>w.idx===ci);if(pos>-1)reorderWords.splice(pos,1);chip.remove();document.getElementById(`chip${ci}`).classList.remove('used');};
  area.appendChild(chip);
}
function norm(s){return s.trim().toLowerCase().replace(/\s+/g,' ');}
function checkExercise(){
  if(exChecked)return;exChecked=true;
  const ex=exQueue[exIdx];let correct=false;
  const card=document.getElementById('exCard');const fb=document.getElementById('feedbackMsg');
  if(ex.type==='fill'){
    const val=document.getElementById('fillInput').value;
    const accepted=(ex.accept||[ex.a]).map(norm);correct=accepted.includes(norm(val));
    const inp=document.getElementById('fillInput');inp.classList.add(correct?'correct':'wrong');inp.disabled=true;
    fb.className='feedback-msg '+(correct?'ok':'err');fb.textContent=correct?'✓ Corretto!':'✗ Risposta corretta: '+ex.a;
  } else if(ex.type==='mc'){
    if(selectedMC<0){exChecked=false;return;}correct=selectedMC===ex.correct;
    document.querySelectorAll('.mc-btn').forEach((b,i)=>{b.disabled=true;if(i===ex.correct)b.classList.add('correct');else if(i===selectedMC&&!correct)b.classList.add('wrong');});
    fb.className='feedback-msg '+(correct?'ok':'err');fb.textContent=correct?'✓ Corretto!':'✗ Risposta corretta: '+ex.opts[ex.correct];
  } else if(ex.type==='reorder'){
    const given=reorderWords.map(w=>w.word).join(' ');correct=norm(given)===norm(ex.answer);
    const area=document.getElementById('answerArea');area.classList.add(correct?'correct':'wrong');
    fb.className='feedback-msg '+(correct?'ok':'err');fb.textContent=correct?'✓ Corretto!':'✗ Risposta corretta: '+ex.answer;
  }
  if(correct){okCount++;if(card){card.classList.add('flash-correct');setTimeout(()=>card.classList.remove('flash-correct'),500);}burstAt(card,'#00ff88');}
  else{badCount++;retryQueue.push(ex);if(!isRetry)recordError(ex._key);if(card){card.classList.add('flash-wrong');setTimeout(()=>card.classList.remove('flash-wrong'),400);}}
  document.getElementById('hudOk').textContent=`✓ ${okCount}`;document.getElementById('hudBad').textContent=`✗ ${badCount}`;
  document.getElementById('checkBtn').style.display='none';document.getElementById('nextBtn').style.display='inline-block';
}
function nextExercise(){
  exIdx++;
  if(exIdx>=exQueue.length){if(retryQueue.length>0){exQueue=shuffle(retryQueue);retryQueue=[];exIdx=0;okCount=0;badCount=0;exChecked=false;isRetry=true;renderExercise();}else showExResults();}
  else renderExercise();
}
function showExResults(){
  const total=exQueue.length,pct=Math.round((okCount/total)*100),passed=pct>=80;
  if(passed){state[currentLevel.id]='completed';unlockNext(currentLevel.id);saveState();setTimeout(()=>{for(let i=0;i<6;i++)setTimeout(()=>spawnBurst(Math.random()*innerWidth,Math.random()*innerHeight*0.5,['#00f0ff','#00ff88','#ffcc00','#cc77ff'][i%4],22),i*200);},100);}
  const btnHtml=passed?`<button class="btn btn-green" onclick="goMap()">← MAPPA</button>`:`<button class="btn btn-primary" onclick="retryLevel()">↺ RIPROVA</button><button class="btn btn-secondary" onclick="goMap()">← MAPPA</button>`;
  document.getElementById('screen-results').innerHTML=`<div class="results-card"><div class="res-pct ${passed?'pass':'fail'}">${pct}%</div><div class="res-label ${passed?'pass':'fail'}">${passed?'✓ LEVEL COMPLETED!':'✗ TRY AGAIN'}</div><div class="res-threshold">soglia: 80% · ${okCount}/${total} corretti</div><div class="res-breakdown"><div class="rb-item"><div class="rb-num g">${okCount}</div><div class="rb-label">CORRETTI</div></div><div class="rb-item"><div class="rb-num r">${badCount}</div><div class="rb-label">ERRORI</div></div></div><div class="action-bar" style="justify-content:center;margin-top:24px">${btnHtml}</div></div>`;
  showScreen('results');
}
function retryLevel(){openLevel(currentLevel);}
function confirmReset(){document.getElementById('resetModal').style.display='flex';}
function closeModal(){document.getElementById('resetModal').style.display='none';}
function doReset(){localStorage.removeItem(SK);localStorage.removeItem(EK);state={};errorMap={};closeModal();loadState();goMap();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(`screen-${id}`).classList.add('active');}
function goMap(){renderMap();showScreen('map');}
loadState();renderMap();
</script>
</body>
</html>
